# 生产环境：使用 PostgreSQL
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aimira_monitor}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:aimira}
    password: ${DB_PASSWORD:}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # 生产环境建议用 validate + flyway/liquibase，MVP 先用 update
      ddl-auto: update
    show-sql: false

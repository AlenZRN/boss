server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: aimira-monitor

  # 默认 Profile: 使用 H2 (本地开发无需 PostgreSQL)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

# ---- 阿里云配置 ----
aliyun:
  access-key: ${ALIYUN_ACCESS_KEY:}
  secret: ${ALIYUN_SECRET:}
  region: ${ALIYUN_REGION:cn-hangzhou}
  # 多区域采集列表，逗号分隔；为空时回退到 region
  regions: ${ALIYUN_REGIONS:cn-guangzhou,cn-shenzhen,cn-hangzhou}
  # 采集开关
  collector:
    enabled: ${ALIYUN_COLLECTOR_ENABLED:true}

# ---- 火山云配置 ----
volcengine:
  access-key: ${VOLCENGINE_ACCESS_KEY:}
  secret: ${VOLCENGINE_SECRET:}
  enabled: ${VOLCENGINE_ENABLED:false}
  balance-enabled: ${VOLCENGINE_BALANCE_ENABLED:true}
  billing-enabled: ${VOLCENGINE_BILLING_ENABLED:true}
  resources-enabled: ${VOLCENGINE_RESOURCES_ENABLED:true}
  regions: ${VOLCENGINE_REGIONS:cn-beijing,cn-shanghai,cn-guangzhou}

# ---- 企业微信配置 ----
wecom:
  webhook-url: ${WECOM_WEBHOOK_URL:}
  enabled: ${WECOM_ENABLED:true}

# ---- 定时任务配置 ----
scheduler:
  # 数据采集: 默认每小时 (秒 分 时 日 月 周)
  collect-cron: ${SCHEDULER_COLLECT_CRON:0 0 * * * *}
  # 告警检测: 默认每小时
  alarm-cron: ${SCHEDULER_ALARM_CRON:0 0 * * * *}
  # 告警冷却时间（秒），默认 86400 = 24小时
  alarm-cooldown-seconds: ${ALARM_COOLDOWN_SECONDS:86400}

# ---- 日志配置 ----
logging:
  level:
    root: INFO
    com.aimira.monitor: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ---- Actuator 端点配置 ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true

# ---- SpringDoc OpenAPI (Swagger UI) ----
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

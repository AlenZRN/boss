<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美央软件下载</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --text: #0f172a;
      --muted: #5b667a;
      --line: rgba(15, 23, 42, 0.12);
      --card: rgba(255, 255, 255, 0.88);
      --primary: #1d4ed8;
      --primary-dark: #123a96;
      --shadow: 0 28px 80px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, 0.12), transparent 26%),
        radial-gradient(circle at top right, rgba(15, 23, 42, 0.08), transparent 20%),
        linear-gradient(180deg, var(--bg) 0%, #eef3f9 100%);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px;
    }

    .page {
      width: min(860px, 100%);
      position: relative;
    }

    .frame {
      position: absolute;
      inset: -18px;
      border: 1px solid rgba(29, 78, 216, 0.08);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.2));
      z-index: 0;
    }

    .panel {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.2fr 0.9fr;
      gap: 24px;
      padding: 28px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
    }

    .mark {
      min-width: 104px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border-radius: 12px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--primary), #58a6ff);
      box-shadow: 0 12px 24px rgba(29, 78, 216, 0.28);
    }

    h1 {
      margin: 18px 0 14px;
      font-size: clamp(34px, 3.7vw, 52px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .lead {
      margin: 0;
      max-width: 34rem;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .download-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      padding: 24px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .download-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .download-item {
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(29, 78, 216, 0.12);
      background: linear-gradient(180deg, rgba(29, 78, 216, 0.06), rgba(255, 255, 255, 0.9));
    }

    .name-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .package-name {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .version {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: white;
      background: linear-gradient(135deg, var(--primary), #2563eb);
      box-shadow: 0 16px 30px rgba(29, 78, 216, 0.24);
    }

    .button-primary:hover {
      box-shadow: 0 20px 38px rgba(29, 78, 216, 0.3);
    }

    .button-ghost {
      color: var(--primary-dark);
      background: rgba(29, 78, 216, 0.08);
    }

    @media (max-width: 760px) {
      body {
        padding: 20px;
      }

      .panel {
        grid-template-columns: 1fr;
        padding: 20px;
      }

      .frame {
        inset: -10px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="frame" aria-hidden="true"></div>
    <section class="panel" aria-label="美央软件下载页面">
      <div>
        <div class="brand">
          <div class="mark">AIMIRA</div>
        </div>
        <h1>美央软件官方下载</h1>
        <p class="lead">
          点击下方按钮即可下载最新版本。
        </p>
      </div>

      <aside class="download-card">
        <h2 class="download-title">下载入口</h2>
        <div class="download-item">
          <div class="name-row">
            <p class="package-name">美央软件包</p>
            <span class="version">v1.0.0</span>
          </div>
          <p class="desc">点击按钮开始下载。</p>
          <div class="actions">
            <a
              class="button button-primary"
              href="https://your-oss-public-url.example.com/your-package.exe"
              target="_blank"
              rel="noopener noreferrer"
            >
              下载软件
            </a>
          </div>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>

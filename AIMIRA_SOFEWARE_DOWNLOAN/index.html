<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>软件下载中心</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --line: #d8e2ec;
      --text: #102033;
      --muted: #5c6b7c;
      --accent: #117a65;
      --accent-2: #0c5f4f;
      --shadow: 0 12px 30px rgba(16, 32, 51, 0.08);
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, rgba(17, 122, 101, 0.08), rgba(17, 122, 101, 0.02) 24%, transparent 24%), var(--bg);
    }

    body {
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    /* 顶部内容块 */
    header {
      display: grid;
      gap: 18px;
      padding: 24px;
      background: linear-gradient(135deg, #ffffff, #f7fbfc);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: grid;
      gap: 6px;
    }

    .brand small {
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
    }

    .summary {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    /* 一键获取安装包内容块 */
    .intro {
      margin-top: 18px;
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .intro h2 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.25;
    }

    .intro p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 10px;
      border: 1px solid transparent;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 10px 22px rgba(17, 122, 101, 0.18);
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent-2);
      border-color: var(--line);
    }

    .notice {
      margin-top: 18px;
      padding: 14px 16px;
      border-left: 4px solid #b45309;
      background: #fffaf0;
      color: #6b4a15;
      border-radius: 8px;
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 20px, 1180px);
        padding-top: 12px;
      }

      header,
      .intro {
        padding: 16px;
      }

      .btn {
        width: 100%;
      }

      .meta-pill {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="topline">
        <div class="brand">
          <small>客户端下载中心</small>
          <h1>AIMIRA 软件</h1>
        </div>
        <div class="meta-row" aria-label="软件信息">
          <span class="meta-pill">当前版本：6.1.0.0</span>
          <span class="meta-pill">更新时间：2026-06-27</span>
          <span class="meta-pill">文件大小：约 4 GB</span>
        </div>
      </div>
      <p class="summary">
        本页面仅提供软件下载页面。
      </p>
    </header>

    <section class="intro">
      <h2>一键获取安装包</h2>
      <p>
        页面提供 Windows AIMIRA 软件包的下载入口，软件包中并附带安装说明、系统要求与校验信息，客户可快速完成下载和部署。
      </p>
      <p>
        点击下方按钮下载，请保持网络畅通，避免下载途中网络中断导致文件不完整。
      </p>

      <div class="cta-row">
        <a class="btn btn-primary" href="#windows">立即下载 Windows 版</a>
      </div>

      <div class="notice">
        提醒：如遇到安装相关问题，可联系AIMIRA工作人员提供支持，邮箱：Alen@aimira.com。
      </div>
    </section>
  </div>
</body>
</html>
